buildscript {
  repositories {
    mavenCentral()
  }
  dependencies {
    classpath files('libs/mucommander-gradle-macappbundle.jar')
  }
}

plugins {
    id 'java'
    id 'org.ajoberstar.grgit' version '5.0.0'
    id 'edu.sc.seis.launch4j' version '2.5.4'
}

// This is the only syntax that appears to work for a local plugin
// TODO: replace this with an official release of gradle-macappbundle
apply plugin: 'edu.sc.seis.macAppBundle'

ext {
    // Open the Git repository in the project's root directory.
    // Handle both regular repos and worktrees
    try {
        git = grgit.open(currentDir: project.rootDir)
        // Get commit id of HEAD.
        revision = git.head().abbreviatedId
    } catch (Exception e) {
        println "Warning: Could not access git repository (${e.message}), using 'dev' as revision"
        revision = "dev"
    }
    // Whether or not to bundle the JRE in order to create a 'standalone' executable
    bundleJRE = project.hasProperty('mucommanderBundleJRE') ? mucommanderBundleJRE.toBoolean() : false
    arch = project.hasProperty('arch') ? arch : System.getProperty('os.arch') // defaults to system architecture
    identity = project.hasProperty('identity') ? identity : ""
}

allprojects {
    tasks.withType(JavaCompile).configureEach {
        options.fork = true
    }

    repositories {
        mavenCentral()
        maven {
            url = uri("https://www.mucommander.com/maven/")
        }
    }

    group = 'org.mucommander'
    version = '1.6.3'
    ext.release = 'snapshot'
    configurations {
        comprise
        compileOnly.extendsFrom comprise
    }
}

task printFullVersionName {
  doLast { println project.version + '-' + project.ext.release }
}

task printVersionName {
  doLast { println project.version }
}

repositories {
    mavenCentral()
    maven {
        url = uri("https://www.mucommander.com/maven/")
    }
}

ext.nonModulePathJpmsModules = [
    'mucommander-core',
    'mucommander-protocol-adb',
    'mucommander-protocol-dropbox',
    'mucommander-protocol-gcs',
    'mucommander-protocol-nfs',
    'mucommander-protocol-onedrive',
    'mucommander-protocol-ovirt',
    'mucommander-protocol-s3',
    'mucommander-protocol-smb',
    'mucommander-format-libguestfs',
    'mucommander-format-rpm',
    'mucommander-viewer-text',
    'mucommander-viewer-binary',
    'mucommander-viewer-image',
    'mucommander-viewer-pdf',
    'mucommander-os-macos',
    'mucommander-os-linux',
    'mucommander-os-openvms',
    'mucommander-os-win',
    'mucommander-bonjour'
]

// JPMS modules that should not use BND plugin
ext.jpmsModules = [
    'mucommander-core',
    'mucommander-commons-collections',
    'mucommander-commons-runtime',
    'mucommander-commons-util',
    'mucommander-commons-io',
    'mucommander-commons-conf',
    'mucommander-commons-file',
    'mucommander-protocol-api',
    'mucommander-viewer-api',
    'mucommander-os-api',
    'mucommander-preferences',
    'mucommander-process',
    'mucommander-command',
    'mucommander-translator',
    'mucommander-encoding',
    'mucommander-core-preload',
    // Protocol modules
    'mucommander-protocol-ftp',
    'mucommander-protocol-sftp',
    'mucommander-protocol-http',
    'mucommander-protocol-smb',
    'mucommander-protocol-s3',
    'mucommander-protocol-nfs',
    'mucommander-protocol-gcs',
    'mucommander-protocol-adb',
    'mucommander-protocol-dropbox',
    'mucommander-protocol-gdrive',
    'mucommander-protocol-onedrive',
    'mucommander-protocol-ovirt',
    'mucommander-protocol-registry',
    'mucommander-protocol-vsphere',
    // Format modules
    'mucommander-format-zip',
    'mucommander-format-tar',
    'mucommander-format-gzip',
    'mucommander-format-bzip2',
    'mucommander-format-xz',
    'mucommander-format-sevenzip',
    'mucommander-format-iso',
    'mucommander-format-rpm',
    'mucommander-format-lst',
    'mucommander-format-libguestfs',
    'mucommander-format-rar',
    'mucommander-format-ar',
    'mucommander-format-cpio',
    // Viewer modules
    'mucommander-viewer-text',
    'mucommander-viewer-binary',
    'mucommander-viewer-image',
    'mucommander-viewer-pdf',
    // OS modules
    'mucommander-os-macos',
    'mucommander-os-linux',
    'mucommander-os-openvms',
    'mucommander-os-win',
    // Other modules
    'jetbrains-jediterm',
    'apache-bzip2',
    'gson',
    'kotlin-reflect',
    'sevenzipjbindings',
    'sun-net-www',
    'mucommander-archiver',
    'mucommander-bonjour',
    'mucommander-protocol-hadoop'
]

subprojects {
    apply plugin: 'java-library'

    compileJava.options.compilerArgs += ['--release', '11']
    compileJava.options.encoding = 'UTF-8'
    compileTestJava.options.encoding = 'UTF-8'

    // Enable JPMS for modules with module-info.java
    if (rootProject.ext.jpmsModules.contains(project.name)) {
        java {
            // Only infer module path for modules that don't have non-modularized dependencies
            if (!rootProject.ext.nonModulePathJpmsModules.contains(project.name)) {
                modularity.inferModulePath = true
            }
            // Note: nonModulePathJpmsModules compile on classpath (not module path)
            // They have module-info.java in resources/ which gets added to the JAR
            // No --add-reads needed since they compile without module-info
        }
    }

    // Ensure ALL modules that depend on mucommander-core wait for compileModuleInfo task
    // This applies to both JPMS and non-JPMS modules
    afterEvaluate {
        def coreProject = rootProject.project(':mucommander-core')
        def isCore = project.name == 'mucommander-core'

        // Check if this project depends on mucommander-core
        def dependsOnCore = project.configurations.findByName('compileClasspath')?.allDependencies?.any { dep ->
            (dep instanceof ProjectDependency) && dep.dependencyProject == coreProject
        } ?: false

        def isNonModulePathModule = rootProject.ext.nonModulePathJpmsModules.contains(project.name)

        // All nonModulePathJpmsModules (viewer/os modules) depend on core, even if not explicitly in dependencies
        // But exclude mucommander-core itself to avoid circular dependency
        if (!isCore && (dependsOnCore || isNonModulePathModule)) {
            // Ensure core project is evaluated first
            evaluationDependsOn(':mucommander-core')

            // Check if compileModuleInfo task exists before depending on it
            def compileModuleInfoTask = coreProject.tasks.findByName('compileModuleInfo')
            if (compileModuleInfoTask != null) {
                tasks.named('compileJava').configure {
                    dependsOn(compileModuleInfoTask)
                }
            }
        }
    }

    dependencies {
        implementation 'org.slf4j:slf4j-api:1.7.36'

        constraints {
            implementation 'com.squareup.okio:okio-jvm:3.11.0'
            implementation 'org.jetbrains.kotlin:kotlin-stdlib:2.1.20'
            implementation 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.1.20'
            implementation 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.1.20'
            implementation 'org.jetbrains.kotlin:kotlin-stdlib-common:2.1.20'
        }
    }
}

compileJava.options.encoding = 'UTF-8'
compileTestJava.options.encoding = 'UTF-8'
compileJava.options.compilerArgs += ['--release', '11']

// Enable JPMS for root launcher module
java {
    modularity.inferModulePath = true
}

configurations.all {
    resolutionStrategy {
        force 'org.slf4j:slf4j-api:2.0.17'
    }
}

// Configure JPMS compilation - put comprise dependencies on module path
// Exclude dependencies that are embedded in other modules
compileJava {
    doFirst {
        def filteredClasspath = classpath.filter {
            !it.name.contains('vappearances') &&
            !it.name.startsWith('jnr-') &&
            !it.name.contains('javax.activation')
        }
        def filteredComprise = configurations.comprise.filter {
            !it.name.contains('vappearances') &&
            !it.name.startsWith('jnr-') &&
            !it.name.contains('javax.activation')
        }
        options.compilerArgs += [
            '--module-path', (filteredClasspath + filteredComprise).asPath
        ]
        classpath = files()
    }
}

dependencies {
    comprise 'com.beust:jcommander:1.82'
    comprise 'com.formdev:flatlaf:2.6'
    comprise 'org.violetlib:vaqua:10'
    comprise project(':jetbrains-jediterm')

    compileOnly 'com.google.code.findbugs:jsr305:1.3.9'

    // Logging dependencies for logback reconfiguration
    implementation 'org.slf4j:slf4j-api:2.0.17'
    implementation 'ch.qos.logback:logback-core:1.5.37'
    implementation 'ch.qos.logback:logback-classic:1.5.37'

    // Add direct dependencies on JPMS modules for compilation
    implementation project(':mucommander-core')
    implementation project(':mucommander-commons-file')
    implementation project(':mucommander-commons-conf')
    implementation project(':mucommander-commons-collections')
    implementation project(':mucommander-commons-io')
    implementation project(':mucommander-commons-runtime')
    implementation project(':mucommander-commons-util')
    implementation project(':mucommander-command')
    implementation project(':mucommander-encoding')
    implementation project(':mucommander-preferences')
    implementation project(':mucommander-process')
    implementation project(':mucommander-translator')
    implementation project(':mucommander-protocol-api')
    implementation project(':mucommander-os-api')
    implementation project(':mucommander-viewer-api')
    implementation project(':mucommander-core-preload')

    // Protocol modules for JPMS runtime (ServiceLoader discovery)
    runtimeOnly project(':mucommander-protocol-ftp')
    runtimeOnly project(':mucommander-protocol-sftp')
    runtimeOnly project(':mucommander-protocol-http')
    runtimeOnly project(':mucommander-protocol-smb')
    runtimeOnly project(':mucommander-protocol-nfs')
    runtimeOnly project(':mucommander-protocol-s3')
    runtimeOnly project(':mucommander-protocol-adb')
    runtimeOnly project(':mucommander-protocol-dropbox')
    runtimeOnly project(':mucommander-protocol-gdrive')
    runtimeOnly project(':mucommander-protocol-onedrive')
    runtimeOnly project(':mucommander-protocol-gcs')
    runtimeOnly project(':mucommander-protocol-ovirt')
    runtimeOnly project(':mucommander-protocol-registry')
    runtimeOnly project(':mucommander-protocol-vsphere')

    // Format modules for JPMS runtime (ServiceLoader discovery)
    runtimeOnly project(':mucommander-format-ar')
    runtimeOnly project(':mucommander-format-bzip2')
    runtimeOnly project(':mucommander-format-cpio')
    runtimeOnly project(':mucommander-format-gzip')
    runtimeOnly project(':mucommander-format-iso')
    runtimeOnly project(':mucommander-format-lst')
    runtimeOnly project(':mucommander-format-rar')
    runtimeOnly project(':mucommander-format-rpm')
    runtimeOnly project(':mucommander-format-sevenzip')
    runtimeOnly project(':mucommander-format-tar')
    runtimeOnly project(':mucommander-format-xz')
    runtimeOnly project(':mucommander-format-zip')
    runtimeOnly project(':mucommander-format-libguestfs')

    // Viewer modules for JPMS runtime (ServiceLoader discovery)
    runtimeOnly project(':mucommander-viewer-text')
    runtimeOnly project(':mucommander-viewer-image')
    runtimeOnly project(':mucommander-viewer-pdf')
    runtimeOnly project(':mucommander-viewer-binary')

    // OS modules for JPMS runtime (ServiceLoader discovery)
    runtimeOnly project(':mucommander-os-macos')
    runtimeOnly project(':mucommander-os-linux')
    runtimeOnly project(':mucommander-os-openvms')
    runtimeOnly project(':mucommander-os-win')

    // Other runtime modules
    runtimeOnly project(':mucommander-archiver')
    runtimeOnly project(':mucommander-bonjour')
}

// Task to prepare proper JPMS module directories (classes + resources combined)
task prepareJpmsModules {
    dependsOn classes

    project.subprojects.each { subproject ->
        if (subproject.plugins.hasPlugin('java')) {
            dependsOn subproject.tasks.classes
        }
    }

    doLast {
        // Copy resources into classes directory for the main project
        def mainResources = sourceSets.main.output.resourcesDir
        if (mainResources.exists()) {
            copy {
                from mainResources
                into sourceSets.main.java.destinationDirectory
            }
        }

        // Copy resources into classes directory for each subproject
        project.subprojects.findAll { it.plugins.hasPlugin('java') }.each { subproject ->
            def subResources = subproject.sourceSets.main.output.resourcesDir
            if (subResources.exists()) {
                copy {
                    from subResources
                    into subproject.sourceSets.main.java.destinationDirectory
                }
            }
        }
    }
}

task runJpms(type: JavaExec) {
    group = 'Run'
    description = 'Runs muCommander with JPMS (Java Platform Module System), optional parameters: -Pdebug=5005 -Psuspend=n'

    dependsOn 'prepareJpmsModules', 'copyConfigForJpms',
              ':mucommander-core:jar',
              ':jetbrains-jediterm:jar',
              ':mucommander-os-macos:jar'

    // Build module path using classes directories (which now include resources)
    // For external dependencies, use JARs
    // Exclude sun-net-www as it conflicts with java.base
    // For modules that embed dependencies (comprise), use JAR files instead of class directories
    // Note: Cloud protocols are excluded - they compile with --add-reads=ALL-UNNAMED and should
    // use classes directory while their dependencies remain on classpath as unnamed modules
    def modulesWithEmbeddedDeps = ['mucommander-core', 'jetbrains-jediterm', 'mucommander-os-macos', 'mucommander-viewer-text', 'mucommander-viewer-binary', 'mucommander-viewer-image', 'mucommander-viewer-pdf']
    def ourProjectClasses = files()
    project.subprojects.findAll { it.plugins.hasPlugin('java') && it.name != 'sun-net-www' }.each {
        if (modulesWithEmbeddedDeps.contains(it.name)) {
            // Use JAR file for modules with embedded dependencies
            ourProjectClasses += files(it.tasks.jar.archiveFile)
        } else {
            // Use compiled classes directory for regular modules
            ourProjectClasses += files(it.sourceSets.main.java.destinationDirectory)
        }
    }

    // External dependencies only (not our subprojects' compiled classes)
    // Include local JARs from libs directories (libguestfs.jar, jadb.jar, vim25.jar, etc.)
    def externalDeps = configurations.runtimeClasspath.filter {
        (!it.path.contains('/mucommander-') ||
         it.name == 'jadb.jar' ||
         it.name == 'libguestfs.jar' ||
         it.name == 'vim25.jar') &&
        !it.path.contains('/mucommander/') &&
        !it.name.startsWith('annotations-') &&
        !it.name.contains('vappearances') &&
        !it.name.startsWith('jnr-') &&
        !it.name.contains('javax.activation') &&
        !it.name.contains('sun-net-www') &&
        !it.name.contains('gson-') &&  // Exclude gson wrapper JAR - use external gson instead
        !it.name.contains('junit') &&  // Exclude test dependencies
        !it.name.contains('hamcrest') &&  // Exclude test dependencies
        !it.name.contains('gapic-google-cloud') &&  // Exclude GCS dependencies with split packages
        !it.name.contains('proto-google-cloud') &&  // Exclude GCS dependencies with split packages
        !it.name.contains('proto-google-common') &&  // Exclude GCS dependencies with split packages
        !it.name.contains('proto-google-iam') &&  // Exclude GCS dependencies with split packages
        !it.name.contains('grpc-') &&  // Exclude grpc dependencies with split packages (for GCS, GDrive)
        !it.name.contains('jsr305') &&  // Exclude jsr305 - conflicts with java.annotation module
        !it.name.contains('google-http-client') &&  // Exclude Google HTTP client libraries (for GCS, GDrive on classpath)
        !it.name.contains('google-api-client') &&  // Exclude Google API client libraries (for GCS, GDrive on classpath)
        !it.name.contains('google-auth') &&  // Exclude Google auth libraries (for GCS, GDrive on classpath)
        !it.name.contains('google-cloud-') &&  // Exclude Google Cloud libraries (for GCS on classpath)
        !it.name.matches('sevenzipjbinding-.*\\.jar') &&  // Exclude external sevenzipjbinding JAR (without 's')
        !it.name.matches('sevenzipjbinding-all-platforms.*\\.jar')  // Exclude sevenzipjbinding-all-platforms
    }

    // Add local library JARs from subprojects
    def localLibs = files()
    localLibs += files('mucommander-protocol-adb/libs/jadb.jar')
    localLibs += files('mucommander-format-libguestfs/libs/libguestfs.jar')
    localLibs += files('mucommander-protocol-vsphere/libs/vim25.jar')

    // For cloud protocols (GCS, GDrive) and format modules (RPM) that use --add-reads=ALL-UNNAMED,
    // their Google Cloud/API dependencies and sevenzipjbinding need to be on classpath (unnamed modules)
    def classpathLibs = configurations.runtimeClasspath.filter {
        it.name.contains('google-http-client') ||
        it.name.contains('google-api-client') ||
        it.name.contains('google-auth') ||
        it.name.contains('google-cloud-') ||
        it.name.contains('gapic-google-cloud') ||
        it.name.contains('proto-google-cloud') ||
        it.name.contains('proto-google-common') ||
        it.name.contains('proto-google-iam') ||
        it.name.contains('grpc-') ||
        it.name.contains('jsr305') ||
        it.name.matches('sevenzipjbinding-.*\\.jar') ||  // Include sevenzipjbinding for RPM module
        it.name.matches('sevenzipjbinding-all-platforms.*\\.jar') ||  // Include sevenzipjbinding-all-platforms
        (it.name.startsWith('gson-') && !it.name.contains('mucommander'))  // Include real Gson, exclude wrapper
    }

    def modulePath = files(sourceSets.main.java.destinationDirectory) +
                     ourProjectClasses +
                     configurations.comprise.filter {
                         !it.name.contains('vappearances') &&
                         !it.name.startsWith('jnr-') &&
                         !it.name.contains('javax.activation') &&
                         !it.name.startsWith('annotations-')
                     } +
                     externalDeps +
                     localLibs

    mainClass = 'com.mucommander.main.muCommander' // Required by Gradle even when using --module

    // Windows imposes a hard limit (~32K chars) on a process's command line. The module path,
    // class path and all the --add-exports/--add-opens/--add-reads flags below easily exceed that,
    // so we write them all to a JDK "@argfile" instead - only the short "@file" token then needs
    // to reach CreateProcess. See: https://docs.oracle.com/javase/9/tools/java.htm (Command-Line Argument Files)
    def argFileArgs = []
    argFileArgs << '--class-path' << classpathLibs.asPath  // Explicitly set classpath for unnamed modules
    argFileArgs << '--module-path' << modulePath.asPath
    argFileArgs << '--add-modules' << 'ALL-MODULE-PATH,jdk.httpserver'  // Add jdk.httpserver for Google OAuth

    // Required JVM access grants for JPMS (must come before --module)
    argFileArgs << '--add-exports' << 'java.desktop/com.apple.laf=ALL-UNNAMED'
    argFileArgs << '--add-exports' << 'java.desktop/com.apple.eio=ALL-UNNAMED'
    argFileArgs << '--add-exports' << 'java.desktop/com.apple.eawt=ALL-UNNAMED'
    argFileArgs << '--add-exports' << 'java.desktop/com.apple.laf=org.mucommander.os.macos'
    argFileArgs << '--add-exports' << 'java.desktop/com.apple.eio=org.mucommander.os.macos'
    argFileArgs << '--add-exports' << 'java.desktop/com.apple.eawt=org.mucommander.os.macos'
    argFileArgs << '--add-opens' << 'java.desktop/javax.swing.plaf.basic=org.mucommander.core'
    argFileArgs << '--add-opens' << 'java.base/java.io=org.mucommander.commons.file'
    argFileArgs << '--add-opens' << 'java.base/java.net=ALL-UNNAMED'
    argFileArgs << '--add-opens' << 'java.transaction.xa/javax.transaction.xa=ALL-UNNAMED'
    argFileArgs << '--add-opens' << 'java.management/javax.management=ALL-UNNAMED'
    argFileArgs << '--add-opens' << 'java.rmi/java.rmi=ALL-UNNAMED'
    argFileArgs << '--add-opens' << 'java.security.jgss/org.ietf.jgss=ALL-UNNAMED'
    argFileArgs << '--add-opens' << 'java.sql/java.sql=ALL-UNNAMED'
    argFileArgs << '--add-opens' << 'java.base/sun.net.www.protocol.http=ALL-UNNAMED'
    argFileArgs << '--add-opens' << 'java.base/sun.net.www.protocol.https=ALL-UNNAMED'

    // Allow cloud protocols to read from unnamed module (classpath) for their non-modular dependencies
    argFileArgs << '--add-reads' << 'org.mucommander.protocol.gcs=ALL-UNNAMED'
    argFileArgs << '--add-reads' << 'org.mucommander.protocol.gdrive=ALL-UNNAMED'
    argFileArgs << '--add-reads' << 'org.mucommander.protocol.dropbox=ALL-UNNAMED'
    argFileArgs << '--add-reads' << 'org.mucommander.protocol.onedrive=ALL-UNNAMED'
    argFileArgs << '--add-reads' << 'org.mucommander.protocol.s3=ALL-UNNAMED'
    argFileArgs << '--add-reads' << 'org.mucommander.protocol.registry=ALL-UNNAMED'
    argFileArgs << '--add-reads' << 'org.mucommander.os.macos=ALL-UNNAMED'
    argFileArgs << '--add-reads' << 'org.mucommander.os.linux=ALL-UNNAMED'
    argFileArgs << '--add-reads' << 'org.mucommander.os.win=ALL-UNNAMED'
    argFileArgs << '--add-reads' << 'org.mucommander.os.openvms=ALL-UNNAMED'

    // sevenzipjbindings/apache-bzip2 have no real module descriptor or Automatic-Module-Name,
    // so they compile as unnamed-module (classpath) dependencies via --add-reads=ALL-UNNAMED,
    // but at runtime they land on the module path (via ALL-MODULE-PATH) as automatic modules
    // named after their jar file (e.g. "sevenzipjbindings-1.6.3.jar" -> "sevenzipjbindings").
    // Grant explicit reads to those automatic module names here.
    argFileArgs << '--add-reads' << 'org.mucommander.format.sevenzip=sevenzipjbindings'
    argFileArgs << '--add-reads' << 'org.mucommander.format.rpm=sevenzipjbindings'
    argFileArgs << '--add-reads' << 'org.mucommander.format.bzip2=apache.bzip2'

    // The external net.sf.sevenzipjbinding jars are non-modular and deliberately kept on the
    // runtime classpath (see classpathLibs above), so these modules also need ALL-UNNAMED reads
    // (already granted at compile time via compileJava's --add-reads, but that doesn't carry
    // over to this separate runtime JVM launch).
    argFileArgs << '--add-reads' << 'org.mucommander.format.sevenzip=ALL-UNNAMED'
    argFileArgs << '--add-reads' << 'org.mucommander.format.rpm=ALL-UNNAMED'

    // viewer-binary's bined/binary_data jars and vsphere's vim25.jar are likewise non-modular
    // (no Automatic-Module-Name), not comprise-embedded, and not in classpathLibs, so they land
    // on the module path as automatic modules named after their jar files at runtime.
    argFileArgs << '--add-reads' << 'org.mucommander.viewer.binary=bined.core,bined.swing,bined.operation,bined.operation.swing,bined.highlight.swing,binary.data,binary.data.array'
    argFileArgs << '--add-reads' << 'org.mucommander.protocol.vsphere=vim25'

    argFileArgs << '--module' << 'org.mucommander/com.mucommander.main.muCommander'

    // Java library path for Libguestfs
    argFileArgs << '-Djava.library.path=/usr/local/lib'

    // Performance optimizations
    argFileArgs << '-Dsun.java2d.metal=false' // see: https://github.com/mucommander/mucommander/issues/1372
    argFileArgs << '-Xshare:auto' << '-XX:-UsePerfData' << '-XX:+TieredCompilation' << '-XX:TieredStopAtLevel=1' // faster start

    // Debug configuration
    def debugSuspend = (project.findProperty('suspend') as String) ?: 'y'
    if (project.hasProperty('debug')) {
        logger.info('Launching muCommander in debug mode...')
        argFileArgs << '-Xdebug' << "-Xrunjdwp:transport=dt_socket,server=y,suspend=${debugSuspend},address=${project.debug}"
    }

    def argFile = layout.buildDirectory.file('runJpms/args.txt').get().asFile
    argFile.parentFile.mkdirs()
    // Per the @argfile format: quote any token containing whitespace, escaping backslashes/quotes within it.
    argFile.text = argFileArgs.collect { arg ->
        arg.contains(' ') ? '"' + arg.replace('\\', '\\\\').replace('"', '\\"') + '"' : arg
    }.join('\n')

    jvmArgs "@${argFile}"
}

task run(dependsOn: 'runJpms') {
    group = 'Run'
    description = 'Runs muCommander from sources (runs with JPMS by default), optional parameters: -Pdebug=5005 -Psuspend=n'
}

jar {
    from configurations.comprise.collect { it.isDirectory() ? it : zipTree(it) }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    // Exclude signature files from signed JARs to avoid "Invalid signature file digest" error
    exclude 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA'

    manifest {
        attributes("Main-Class": "com.mucommander.main.muCommander",
                   "Specification-Title": "muCommander",
