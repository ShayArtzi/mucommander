task macAppImage(dependsOn: 'createJpmsPackaging', type: Exec) {
    workingDir "${projectDir}"

    // Clean existing app before creating new one
    doFirst {
        delete("${buildDir}/muCommander.app")
    }

    def jpackageCommand = [
                'jpackage', \
                '--module-path', 'build/jpms/', \
                '--module', 'org.mucommander/com.mucommander.main.muCommander', \
                '--name', 'muCommander', \
                '--app-version', project.version, \
                '--icon', 'package/osx/icon.icns', \
                '--runtime-image', 'jre/macOS/'+project.ext.arch, \
                '--java-options', '\
                         -Dsun.java2d.d3d=false -Dsun.java2d.noddraw=false -Dsun.java2d.metal=false \
                         -Dapple.awt.enableTemplateImages=true \
                         -Xshare:auto -XX:-UsePerfData -XX:+TieredCompilation -XX:TieredStopAtLevel=1 \
                        -cp $APPDIR/mods/lib/* \
                        --add-modules ALL-MODULE-PATH,jdk.httpserver \
                        --add-exports java.desktop/com.apple.laf=ALL-UNNAMED \
                        --add-exports java.desktop/com.apple.eio=ALL-UNNAMED \
                        --add-exports java.desktop/com.apple.eawt=ALL-UNNAMED \
                        --add-exports java.desktop/com.apple.laf=org.mucommander.os.macos \
                        --add-exports java.desktop/com.apple.eio=org.mucommander.os.macos \
                        --add-exports java.desktop/com.apple.eawt=org.mucommander.os.macos \
                        --add-opens java.desktop/javax.swing.plaf.basic=org.mucommander.core \
                        --add-opens java.base/java.io=org.mucommander.commons.file \
                        --add-opens java.base/java.net=ALL-UNNAMED \
                        --add-opens java.transaction.xa/javax.transaction.xa=ALL-UNNAMED \
                        --add-opens java.management/javax.management=ALL-UNNAMED \
                        --add-opens java.rmi/java.rmi=ALL-UNNAMED \
                        --add-opens java.security.jgss/org.ietf.jgss=ALL-UNNAMED \
                        --add-opens java.sql/java.sql=ALL-UNNAMED \
                        --add-opens java.base/sun.net.www.protocol.http=ALL-UNNAMED \
                        --add-opens java.base/sun.net.www.protocol.https=ALL-UNNAMED \
                        --add-reads org.mucommander.protocol.gcs=ALL-UNNAMED \
                        --add-reads org.mucommander.protocol.gdrive=ALL-UNNAMED \
                        --add-reads org.mucommander.protocol.dropbox=ALL-UNNAMED \
                        --add-reads org.mucommander.protocol.onedrive=ALL-UNNAMED \
                        --add-reads org.mucommander.protocol.s3=ALL-UNNAMED \
                        --add-reads org.mucommander.protocol.registry=ALL-UNNAMED \
                        --add-reads org.mucommander.os.macos=ALL-UNNAMED \
                        --add-reads org.mucommander.os.linux=ALL-UNNAMED \
                        --add-reads org.mucommander.os.win=ALL-UNNAMED \
                        --add-reads org.mucommander.os.openvms=ALL-UNNAMED', \
                '--mac-package-identifier', 'com.mucommander.muCommander', \
                '--type', 'app-image', \
                '--dest', "${buildDir}", \
                '--mac-package-signing-prefix', 'com.mucommander.', \
                '--mac-signing-key-user-name', project.ext.identity, \
                '--verbose'
    ]

    // skip signing if gradle invoked with -PskipDmgSign (for dev purposes only)
    if (!project.hasProperty('skipDmgSign')) {
      jpackageCommand += '--mac-sign'
    }

    commandLine jpackageCommand

    doLast {
       copy {
          from "package"
          include "readme.txt"
          into "${buildDir}/muCommander.app/Contents/Resources"
       }
       // Delete unwanted OS-specific modules from the app
       delete fileTree(dir: "${buildDir}/muCommander.app/Contents/app/", include: 'mucommander-os-linux*')
       delete fileTree(dir: "${buildDir}/muCommander.app/Contents/app/", include: 'mucommander-os-win*')
       delete fileTree(dir: "${buildDir}/muCommander.app/Contents/app/", include: 'mucommander-os-openvms*')
       exec {
          executable "package/osx/muCommander-post-image.sh"
       }
       if (project.ext.identity?.trim()) {
         exec {
           workingDir "${rootDir}"
           executable 'java'
           args '-jar', 'package/osx/SignPackage-1.0-jar-with-dependencies.jar', '-d', "${buildDir}/muCommander.app/Contents/app", '-t', '-r', '-k', project.ext.identity, '-e', 'package/osx/mucommander-entitlements'
         }
         exec {
           workingDir "${rootDir}"
           executable '/usr/bin/codesign'
           args '--entitlements', 'package/osx/mucommander-entitlements', '--options', 'runtime', '--deep', '--timestamp', '-s', project.ext.identity, '-f', "${buildDir}/muCommander.app/Contents/MacOS/muCommander"
         }
         exec {
           workingDir "${rootDir}"
           executable '/usr/bin/codesign'
           args '--entitlements', 'package/osx/mucommander-entitlements', '--options', 'runtime', '--deep', '--timestamp', '-s', project.ext.identity, '-f', "${buildDir}/muCommander.app"
         }
       }
    }
}

