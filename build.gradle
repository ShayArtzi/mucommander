// JPMS packaging JAR - does NOT embed comprise dependencies (they must be separate modules)
task jpmsJar(type: Jar) {
    archiveClassifier = 'jpms'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    from sourceSets.main.output

    // Exclude signature files
    exclude 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA'

    manifest {
        attributes("Main-Class": "com.mucommander.main.muCommander",
                   "Specification-Title": "muCommander",
                   "Specification-Vendor": "Arik Hadas",
                   "Specification-Version": project.version,
                   "Implementation-Title": "muCommander",
                   "Implementation-Vendor": "Arik Hadas",
                   "Implementation-Version": revision,
                   "Build-Date": new Date().format('yyyyMMdd'))
    }
}

