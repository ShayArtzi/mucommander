import org.apache.tools.ant.filters.ReplaceTokens

// Task to prepare JPMS packaging structure for jpackage
task createJpmsPackaging {
    dependsOn build, jpmsJar

    // Ensure all subproject JARs are built
    project.subprojects.each { subproject ->
        if (subproject.plugins.hasPlugin('java')) {
            dependsOn subproject.tasks.jar
        }
    }

    doLast {
        // Create jpms directory structure
        def jpmsDir = file("${buildDir}/jpms")
        jpmsDir.mkdirs()

        // Copy JPMS-specific main launcher JAR (without embedded comprise dependencies)
        copy {
            from jpmsJar.archiveFile
            into jpmsDir
            rename { 'mucommander-' + project.version + '.jar' }
        }

        // Copy configuration
        copy {
            from "package"
            include "logback.xml"
            into "${jpmsDir}/conf"
        }

        // For jpackage with JPMS, we need all module JARs in the input directory
        // Exclude only sun-net-www (conflicts with java.base)
        project.subprojects.findAll {
            it.plugins.hasPlugin('java') && it.name != 'sun-net-www'
        }.each { subproject ->
            copy {
                from subproject.tasks.jar.archiveFile
                into jpmsDir
            }
        }

        // Copy comprise dependencies (required by main module) as separate JARs
        // These are declared as 'requires' in module-info.java so they must be on module path
        // Only copy the main comprise artifacts (jcommander, flatlaf, vaqua)
        // Exclude transitive dependencies which will be handled by runtimeClasspath
        copy {
            from configurations.comprise.filter {
                // Only include the direct comprise dependencies
                (it.name.contains('jcommander') ||
                 it.name.contains('flatlaf') ||
                 it.name.contains('vaqua')) &&
                // Exclude project dependencies
                !it.path.contains('/mucommander-') &&
                !it.path.contains('/mucommander/')
            }
            into jpmsDir
        }

        // Copy external runtime dependencies with automatic deduplication
        // Separate into module path (JPMS compatible) and classpath (problematic dependencies)
        def modulePathDeps = [:] as Map<String, File>
        def classpathDeps = [] as List<File>

        configurations.runtimeClasspath.each { file ->
            // Skip basic exclusions
            if (file.path.contains('/mucommander-') ||
                file.path.contains('/mucommander/') ||
                file.name.contains('sun-net-www') ||
                file.name.contains('junit') ||
                file.name.contains('hamcrest') ||
                // Skip comprise deps (already copied)
                file.name.contains('jcommander') ||
                file.name.contains('flatlaf') ||
                file.name.contains('vaqua') ||
                // Skip old JDK-specific versions (keep newer ones)
                file.name.startsWith('bcprov-jdk15on-') ||
                file.name.startsWith('annotations-4.') ||
                // Exclude jsr305 - conflicts with java.annotation module
                file.name.contains('jsr305') ||
                // Exclude standalone gson - we use the wrapper module
                (file.name.startsWith('gson-') && !file.name.contains('mucommander')) ||
                // Exclude errorprone-annotations - causes split package conflicts
                file.name.contains('error_prone_annotations') ||
                file.name.contains('errorprone-annotations') ||
                // Exclude jetbrains annotations - embedded in jetbrains-jediterm
                file.name.startsWith('annotations-13.') ||
                // Exclude checker-qual - embedded in main JAR
                file.name.startsWith('checker-qual-')) {
                return
            }

            // Cloud protocol dependencies go on classpath (have split packages)
            if (file.name.contains('google-http-client') ||
                file.name.contains('google-api-client') ||
                file.name.contains('google-auth') ||
                file.name.contains('google-cloud-') ||
                file.name.contains('gapic-google-cloud') ||
                file.name.contains('proto-google-cloud') ||
                file.name.contains('proto-google-common') ||
                file.name.contains('proto-google-iam') ||
                file.name.contains('grpc-') ||
                file.name.contains('dropbox-core-sdk') ||
                file.name.contains('microsoft-graph') ||
                file.name.contains('azure-') ||
                file.name.contains('msal4j') ||
                file.name.contains('aws-java-sdk') ||
                file.name.contains('aws-sdk-')) {
                classpathDeps.add(file)
                return
            }

            // Extract base name for deduplication
            def baseName = file.name.replaceAll(/-\d+[\d.\-\w]*\.jar$/, '')

            // Special case: keep slf4j-api 1.7.36 (not 2.0.9) to match logback-classic 1.2.13
            if (baseName == 'slf4j-api') {
                if (file.name.contains('1.7.')) {
                    modulePathDeps[baseName] = file
                }
                return
            }

            // Keep only the latest version (by file name length as a heuristic)
            if (!modulePathDeps.containsKey(baseName) || file.name > modulePathDeps[baseName].name) {
                modulePathDeps[baseName] = file
            }
        }

        // Copy module path dependencies to main jpms directory
        copy {
            from modulePathDeps.values()
            into jpmsDir
        }

        // Copy classpath dependencies to lib subdirectory (for cloud protocols)
        if (!classpathDeps.isEmpty()) {
            def libDir = file("${jpmsDir}/lib")
            libDir.mkdirs()
            copy {
                from classpathDeps
                into libDir
            }
        }
    }
}

launch4j {
    icon = "$projectDir/package/windows/mucommander.ico"
    mainClassName = "com.mucommander.main.muCommander"
